<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lootly POS — Point of Sale System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
 --bg:#F7F6F2;--surface:#FFFFFF;--surface2:#F0EEE8;--border:#E2DED4;
 --text:#1C1B18;--text2:#6B6760;--text3:#A09C96;
 --accent:#D85A30;--accent-bg:#FAECE7;--accent-text:#993C1D;
 --green:#3B6D11;--green-bg:#EAF3DE;--green-text:#27500A;
 --amber:#BA7517;--amber-bg:#FAEEDA;--amber-text:#633806;
 --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#0C447C;
 --red:#E24B4A;--red-bg:#FCEBEB;--red-text:#A32D2D;
 --sidebar:220px;--radius:10px;--radius-sm:6px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14px}
#sidebar{width:var(--sidebar);background:var(--text);color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.brand{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,0.1)}
.brand-name{font-size:16px;font-weight:600;color:#fff;letter-spacing:-0.3px}
.brand-sub{font-size:11px;color:rgba(255,255,255,0.45);margin-top:2px}
.nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;color:rgba(255,255,255,0.6);font-size:13px;font-weight:500;transition:all 0.15s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav-item:hover{color:#fff;background:rgba(255,255,255,0.08)}
.nav-item.active{color:#fff;background:var(--accent)}
.nav-icon{width:16px;height:16px;flex-shrink:0}
.sidebar-footer{padding:12px 8px;border-top:1px solid rgba(255,255,255,0.1)}
.store-info{padding:8px 10px;border-radius:var(--radius-sm);background:rgba(255,255,255,0.07)}
.store-name{font-size:12px;font-weight:500;color:rgba(255,255,255,0.8)}
.store-date{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.page-title{font-size:15px;font-weight:600}
.topbar-actions{display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all 0.15s;font-family:inherit}
.btn:hover{background:var(--surface2)}
.btn:disabled{opacity:0.45;cursor:not-allowed;pointer-events:none}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#c24d26}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-green:hover{background:#2d5a0d}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-ghost{border-color:transparent;background:transparent}
.btn-ghost:hover{background:var(--surface2)}
.btn-danger{background:var(--red-bg);color:var(--red-text);border-color:transparent}
.btn-danger:hover{background:#f5c1c1}
.content{flex:1;overflow-y:auto;padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.card-title{font-size:11px;font-weight:500;color:var(--text3);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.stat-value{font-size:22px;font-weight:600;color:var(--text);line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.profit-positive{color:var(--green);font-weight:600}
.profit-negative{color:var(--red);font-weight:600}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:var(--green-bg);color:var(--green-text)}
.badge-red{background:var(--red-bg);color:var(--red-text)}
.badge-amber{background:var(--amber-bg);color:var(--amber-text)}
.badge-blue{background:var(--blue-bg);color:var(--blue-text)}
.badge-gray{background:var(--surface2);color:var(--text2)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}

/* POS */
#pos-layout{display:flex;flex:1;overflow:hidden}
#product-panel{flex:1;overflow-y:auto;padding:16px;background:var(--bg)}
#cart-panel{width:320px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(126px,1fr));gap:10px}
.product-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:all 0.15s;text-align:center;user-select:none}
.product-card:hover{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}
.product-card.oos{opacity:0.45;cursor:not-allowed;pointer-events:none}
.p-sku{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:4px;letter-spacing:0.3px}.p-brand{font-size:10px;color:var(--text3);margin-bottom:3px}
.p-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:3px;line-height:1.3}
.p-price{font-size:13px;font-weight:600;color:var(--accent)}
.p-stock{font-size:10px;color:var(--text3)}
.cart-hdr{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cart-items{flex:1;overflow-y:auto;padding:8px;min-height:0}
.cart-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:var(--radius-sm);margin-bottom:3px}
.cart-item:hover{background:var(--bg)}
.qty-ctrl{display:flex;align-items:center;gap:4px}
.qty-btn{width:22px;height:22px;border:1px solid var(--border);border-radius:4px;background:var(--surface);cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;color:var(--text);font-family:inherit}
.qty-btn:hover{background:var(--surface2)}
.qty-num{font-size:12px;font-weight:700;min-width:20px;text-align:center}
.cart-footer{border-top:1px solid var(--border);padding:12px 16px;flex-shrink:0}
.cart-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;color:var(--text2)}
.cart-total-row{font-size:17px;font-weight:700;color:var(--text);border-top:1px solid var(--border);padding-top:10px;margin-top:6px;margin-bottom:12px;display:flex;justify-content:space-between}
.cart-empty{padding:40px 16px;text-align:center;color:var(--text3);font-size:13px}
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.pay-btn{padding:8px 4px;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-weight:600;text-align:center;background:var(--surface);color:var(--text2);transition:all 0.15s;font-family:inherit}
.pay-btn:hover{border-color:var(--accent);color:var(--accent)}
.pay-btn.sel{border-color:var(--accent);background:var(--accent-bg);color:var(--accent-text)}

/* Cash panel */
.cash-displays{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.cash-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px}
.cash-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.4px;font-weight:500;margin-bottom:2px}
.cash-val{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text);line-height:1.2}
.cash-val.pos{color:var(--green)}
.cash-val.neg{color:var(--red)}
.cash-input{width:100%;padding:9px 10px;border:1.5px solid var(--accent);border-radius:var(--radius-sm);font-size:15px;font-family:'DM Mono',monospace;font-weight:600;color:var(--text);background:var(--surface);outline:none;margin-bottom:8px}
.cash-input:focus{box-shadow:0 0 0 3px var(--accent-bg)}
.bill-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px}
.bill-btn{padding:7px 0;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-weight:600;text-align:center;background:var(--surface);color:var(--text2);transition:all 0.15s;font-family:'DM Mono',monospace}
.bill-btn:hover{background:var(--amber-bg);color:var(--amber-text);border-color:var(--amber)}
.bill-exact{background:var(--green-bg);color:var(--green-text);border-color:transparent;grid-column:span 2}
.bill-exact:hover{background:#C0DD97;color:var(--green-text)}

/* Forms */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px}
.form-input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;color:var(--text);background:var(--surface)}
.form-input:focus{outline:none;border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
select.form-input{cursor:pointer}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--surface);border-radius:var(--radius);padding:24px;width:520px;max-width:92vw;max-height:88vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* Receipt */
.receipt{font-family:'DM Mono',monospace;font-size:12px;background:#fafaf8;padding:20px;border-radius:var(--radius);border:1px solid var(--border)}
.r-title{text-align:center;font-size:14px;font-weight:700;margin-bottom:4px}
.r-sub{text-align:center;color:var(--text2);margin-bottom:14px;font-size:11px}
.r-line{display:flex;justify-content:space-between;margin-bottom:4px}
.r-div{border:none;border-top:1px dashed var(--border);margin:10px 0}
.r-total{font-weight:700;font-size:13px}
.r-change{font-size:15px;font-weight:700;color:var(--green-text)}

/* Search/filter */
.search-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;margin-bottom:12px}
.search-bar input{flex:1;border:none;outline:none;font-size:13px;font-family:inherit;color:var(--text);background:transparent}
.search-bar input::placeholder{color:var(--text3)}
.cat-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.cat-btn{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--text2);transition:all 0.15s;font-family:inherit}
.cat-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:80px;margin-top:8px}
.bar{flex:1;background:var(--accent-bg);border-radius:3px 3px 0 0;min-width:20px;transition:background 0.15s}
.bar:hover{background:var(--accent)}
.bar-label{font-size:9px;color:var(--text3);text-align:center;margin-top:3px}
.low-alert{background:var(--amber-bg);border:1px solid #FAC775;border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;color:var(--amber-text);margin-bottom:12px}

/* DB */
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:9px 16px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.danger-zone{background:var(--red-bg);border:1px solid #F09595;border-radius:var(--radius-sm);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.dz-text{font-size:13px;color:var(--red-text);font-weight:500}
.dz-sub{font-size:11px;color:var(--red-text);opacity:0.7;margin-top:2px}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
</style>
</head>

<script>
// ════════════════════════════════════════════
// GOOGLE SHEETS DATA LAYER
// Paste your Apps Script Web App URL below
// ════════════════════════════════════════════
let GS_URL = localStorage.getItem('gs_url') || '';
let FX_RATE = parseFloat(localStorage.getItem('fx_rate')) || 47; // SGD → PHP exchange rate

function cp(x){return JSON.parse(JSON.stringify(x));}

// In-memory DB — loaded from Google Sheets on startup
let DB = {products:[], transactions:[], expenses:[], movements:[], priceChanges:[]};

// ── API call helper ──────────────────────────────────────────
async function api(action, body={}) {
  if(!GS_URL) throw new Error('NO_URL');
  const res = await fetch(GS_URL, {
    method:'POST',
    body: JSON.stringify({action, ...body}),
  });
  const json = await res.json();
  if(!json.ok) throw new Error(json.error||'API error');
  return json.data;
}

// ── Load all data from Sheets on startup ────────────────────
async function loadFromSheets() {
  showSyncBanner('loading');
  try {
    await api('init');            // ensure headers exist
    const all = await api('getAll');
    DB.products     = (all.products     || []);
    DB.transactions = (all.transactions || []).map(t=>({...t,
      date: toDateStr(t.date),
      time: normaliseTime(t.time)
    }));
    DB.expenses  = (all.expenses  || []).map(e=>({...e, date:toDateStr(e.date)}));
    DB.movements = (all.movements || []).map(m=>({...m,
      date: toDateStr(m.date),
      time: normaliseTime(m.time)
    }));
    DB.priceChanges = (all.priceChanges || []).map(pc=>({...pc,
      date: toDateStr(pc.date),
      time: normaliseTime(pc.time)
    }));
    hideSyncBanner();
    return true;
  } catch(e) {
    if(e.message === 'NO_URL') {
      hideSyncBanner();
    } else {
      showSyncBanner('error', e.message);
    }
    return false;
  }
}

// ── Save helpers — write to Sheets immediately ───────────────
async function saveProduct(p) {
  try { await api('saveProduct', {data: p}); }
  catch(e) { console.warn('Sheets sync failed:', e.message); }
}
async function saveTransaction(tx) {
  try { await api('saveTransaction', {data: tx}); }
  catch(e) { console.warn('Sheets sync failed:', e.message); }
}
async function saveExpense(ex) {
  try { await api('saveExpense', {data: ex}); }
  catch(e) { console.warn('Sheets sync failed:', e.message); }
}
async function deleteProduct(id) {
  try { await api('deleteProduct', {id}); }
  catch(e) { console.warn('Sheets sync failed:', e.message); }
}
async function deleteTransaction(id) {
  try { await api('deleteTransaction', {id}); }
  catch(e) { console.warn('Sheets sync failed:', e.message); }
}
async function deleteExpense(id) {
  try { await api('deleteExpense', {id}); }
  catch(e) { console.warn('Sheets sync failed:', e.message); }
}
async function saveMovement(mv) {
  try { await api('saveMovement', {data: mv}); }
  catch(e) { console.warn('Sheets sync failed:', e.message); }
}
async function deleteMovement(id) {
  try { await api('deleteMovement', {id}); }
  catch(e) { console.warn('Sheets sync failed:', e.message); }
}
async function savePriceChange(pc) {
  try { await api('savePriceChange', {data: pc}); }
  catch(e) { console.warn('Sheets sync failed:', e.message); }
}
async function deletePriceChange(id) {
  try { await api('deletePriceChange', {id}); }
  catch(e) { console.warn('Sheets sync failed:', e.message); }
}
async function clearSheetRemote(sheetName) {
  try { await api('clearSheet', {sheet: sheetName}); }
  catch(e) { console.warn('Sheets clear failed:', e.message); }
}
async function bulkDeleteRemote(sheetName, ids) {
  try { await api('bulkDelete', {sheet: sheetName, ids}); }
  catch(e) { console.warn('Sheets bulk delete failed:', e.message); }
}

// ── Sync status banner ───────────────────────────────────────
function showSyncBanner(state, msg='') {
  let bar = document.getElementById('sync-bar');
  if(!bar){ bar=document.createElement('div'); bar.id='sync-bar'; document.body.appendChild(bar); }
  bar.style.cssText='position:fixed;top:0;left:0;right:0;z-index:9999;padding:8px 20px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:8px;';
  if(state==='loading'){
    bar.style.background='#185FA5';bar.style.color='#fff';
    bar.innerHTML='<span style="animation:spin 1s linear infinite;display:inline-block">&#8635;</span> Loading data from Google Sheets...';
  } else if(state==='saving'){
    bar.style.background='#3B6D11';bar.style.color='#fff';
    bar.innerHTML='&#10003; Saving to Google Sheets...';
    setTimeout(hideSyncBanner, 1500);

// 
// UTILS
// 
const fmt=n=>'₱'+Number(n).toFixed(2);
// Always use LOCAL date/time — never UTC
const today=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const nowTime=()=>new Date().toLocaleTimeString('en-SG',{hour:'2-digit',minute:'2-digit',hour12:false});
const uid=()=>Math.random().toString(36).slice(2,9);
// ── Date / time helpers ─────────────────────────────────────
// Apps Script always returns date as "YYYY-MM-DD" and time as "HH:MM".
// These functions also handle any edge-case raw values defensively.

function toDateStr(s){
 if(s===null||s===undefined||s==='') return '';
 if(typeof s==='number'){
  // OLE serial from Sheets — use UTC math to avoid TZ shift
  // Sheets epoch = Jan 1 1900 = serial 1 (with leap-year bug offset of 2)
  const ms=(s-25569)*86400*1000;
  const d=new Date(ms);
  return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');
 }
 const str=String(s).trim();
 // Already YYYY-MM-DD
 if(/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
 // ISO or datetime string — extract date portion only (no TZ shift)
 const m=/^(\d{4})-(\d{2})-(\d{2})/.exec(str);
 if(m) return m[1]+'-'+m[2]+'-'+m[3];
 return str;
}

function normaliseTime(t){
 if(t===null||t===undefined||t==='') return '—';
 if(typeof t==='string'){
  const str=t.trim();
  // Already HH:MM or HH:MM:SS
  if(/^\d{1,2}:\d{2}/.test(str)) return str.slice(0,5);
  // ISO datetime — extract time part
  const iso=/T(\d{2}:\d{2})/.exec(str);
  if(iso) return iso[1];
 }
 if(typeof t==='number'){
  // Fractional day (e.g. 0.604 = 14:29) or full OLE serial
  const frac=t%1;
  const totalSec=Math.round(frac*86400);
  const hh=String(Math.floor(totalSec/3600)).padStart(2,'0');
  const mm=String(Math.floor((totalSec%3600)/60)).padStart(2,'0');
  return hh+':'+mm;
 }
 return '—';
}

function fmtDate(s){
 const ds=toDateStr(s);
 if(!ds) return '—';
 const [y,m,d]=ds.split('-').map(Number);
 if(!y||!m||!d) return '—';
 return new Date(y,m-1,d).toLocaleDateString('en-SG',{day:'2-digit',month:'short',year:'numeric'});
}
function parseDate(s){
 const ds=toDateStr(s);
 if(!ds) return new Date(0);
 const [y,m,d]=ds.split('-').map(Number);
 return new Date(y,m-1,d);
}

   ?'<span style="color:var(--accent);margin-left:3px;font-size:10px">▲</span>'
   :'<span style="color:var(--accent);margin-left:3px;font-size:10px">▼</span>';
 }

 function drawHeaders(){
  document.querySelector('#inv-thead tr').innerHTML=cols.map(([label,key])=>{
   if(!key) return`<th>${label}</th>`;
   const active=sortCol===key;
   return`<th style="cursor:pointer;user-select:none;white-space:nowrap;${active?'color:var(--text);':''}background:transparent;transition:color 0.15s"
    onclick="window._invSort('${key}')"
    onmouseover="this.style.color='var(--text)'"
    onmouseout="this.style.color='${active?'var(--text)':'var(--text3)'}'"
   >${label}${sortIcon(key)}</th>`;
  }).join('');
 }

 function drawTable(){
  // Update stats
  const lowCount=DB.products.filter(p=>p.stock<=5).length;
  document.getElementById('inv-stat-count').textContent=DB.products.length;
  document.getElementById('inv-stat-val').textContent=fmt(DB.products.reduce((x,p)=>x+p.cost*p.stock,0));
  const lowEl=document.getElementById('inv-stat-low');
  lowEl.textContent=lowCount;
  lowEl.className='stat-value '+(lowCount>0?'profit-negative':'profit-positive');
  // Filter
  let prods=[...DB.products];
  if(s){const q=s.toLowerCase();prods=prods.filter(p=>p.name.toLowerCase().includes(q)||p.category.toLowerCase().includes(q)||(p.sku||'').toLowerCase().includes(q)||(p.brand||'').toLowerCase().includes(q)||(p.model||'').toLowerCase().includes(q));}
  // Sort
  const getter=sortCols[sortCol];
  if(getter){
   prods.sort((a,b)=>{
    const av=getter(a), bv=getter(b);
    if(av<bv) return sortDir==='asc'?-1:1;
    if(av>bv) return sortDir==='asc'?1:-1;
    return 0;
   });
  }
  // Render headers (updates sort icons)
  drawHeaders();
  // Render tbody
  document.getElementById('inv-tbody').innerHTML=prods.map(p=>{
   const mg=p.price>0?((p.price-p.cost)/p.price*100).toFixed(0):'0';
   const sc=p.stock===0?'badge-red':p.stock<=5?'badge-amber':p.stock<=15?'badge-blue':'badge-green';
   const st=p.stock===0?'Out of stock':p.stock<=5?'Low stock':p.stock<=15?'Limited':'In stock';
   // resolve dateAdded — fall back to createdAt if field absent (products added before this update)
   const da=p.dateAdded||toDateStr(p.createdAt)||'';
   return`<tr>
   <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)">${p.sku||'&#x2014;'}</td>
   <td><strong style="font-weight:500">${p.name}</strong></td>
   <td>${p.brand||'&#x2014;'}</td>
   <td>${p.make||'&#x2014;'}</td>
   <td>${p.model||'&#x2014;'}</td>
   <td><span class="badge badge-gray">${p.category}</span></td>
   <td style="font-weight:500">${fmt(p.price)}</td>
   <td style="color:var(--text2)">${fmt(p.cost)}</td>
   <td style="color:var(--text2)">${p.costSGD?'S$'+Number(p.costSGD).toFixed(2):'&#x2014;'}</td>
   <td style="color:var(--green);font-weight:500">${mg}%</td>
   <td style="font-weight:700">${p.stock}</td>
   <td><span class="badge ${sc}">${st}</span></td>
   <td style="color:var(--text2);font-size:12px">${da?fmtDate(da):'&#x2014;'}</td>
   <td style="white-space:nowrap">
   <button class="btn btn-sm btn-ghost" onclick="editProduct('${p.id}')">Edit</button>
   <button class="btn btn-sm btn-ghost" onclick="restock('${p.id}')">Restock</button>
   <button class="btn btn-sm btn-ghost btn-danger" onclick="delProd('${p.id}')">Delete</button>
   </td></tr>`;}).join('');
 }

 window._invSort=function(key){
  if(sortCol===key){sortDir=sortDir==='asc'?'desc':'asc';}
  else{sortCol=key;sortDir='asc';}
  drawTable();
 };
 window._invRdw=drawTable;
 drawTable();
}

 let sortDir='desc'; // newest first by default

function getMonthly(){
 const m={};
 DB.transactions.forEach(t=>{
 const k=t.date.slice(0,7);
 if(!m[k])m[k]={rev:0,cogs:0};
 m[k].rev+=t.total;
 (t.items||[]).forEach(i=>{const p=DB.products.find(x=>x.id===i.id);if(p)m[k].cogs+=p.cost*i.qty;});
 });
 return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0])).map(([k,v])=>({label:new Date(k+'-01').toLocaleDateString('en-SG',{month:'short',year:'numeric'}),...v,profit:v.rev-v.cogs}));
}

window.addExpense=function(){
 showModal('Add Expense',`
 <div class="form-row"><div class="form-group"><label class="form-label">Date</label><input class="form-input" type="date" id="fd" value="${today()}"/></div>
 <div class="form-group"><label class="form-label">Amount (₱)</label><input class="form-input" type="number" id="fa" placeholder="0.00" step="0.01" min="0"/></div></div>

 </div>
 <div class="form-group"><label class="form-label">Description</label><input class="form-input" id="fdesc" placeholder="Brief description…"/></div>`,
 ()=>{

 if(!date||isNaN(amount)||amount<=0){alert('Fill in date and a valid amount.');return false;}
 const newE={id:'e'+uid(),date,category:cat,desc:desc||cat,amount};
 DB.expenses.push(newE);

 });
};
window.delExp=function(id){

 DB.expenses=DB.expenses.filter(e=>e.id!==id);deleteExpense(id);showSyncBanner('saving');

};

     const costChanged=pc.costChange!==0&&pc.costChange!=='';
     const badgeClass=pc.action==='Sell Price Increase'||pc.action==='Cost Price Increase'?'badge-green':pc.action==='Sell & Cost Price Change'?'badge-blue':'badge-red';
     const sellSign=pc.change>0?'+':'';
     const costSign=pc.costChange>0?'+':'';
     return`<tr>
      <td><input type="checkbox" ${pc._sel?'checked':''} onchange="window._spc('${pc.id}',this.checked)"/></td>
      <td>${fmtDate(pc.date)}</td><td>${pc.time||'—'}</td>

      <td style="text-align:right;font-family:'DM Mono',monospace;font-weight:700;${pc.change>0?'color:var(--green)':pc.change<0?'color:var(--red)':''}">${sellChanged?sellSign+fmt(pc.change):'—'}</td>
      <td style="text-align:right;font-family:'DM Mono',monospace">${costChanged?fmt(pc.oldCost):'—'}</td>
      <td style="text-align:right;font-family:'DM Mono',monospace;font-weight:600">${costChanged?fmt(pc.newCost):'—'}</td>
      <td style="text-align:right;font-family:'DM Mono',monospace;font-weight:700;${pc.costChange>0?'color:var(--green)':pc.costChange<0?'color:var(--red)':''}">${costChanged?costSign+fmt(pc.costChange):'—'}</td>
      <td style="font-size:12px;color:var(--text2);max-width:200px">${pc.note||'—'}</td>
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)">${pc.id}</td>
      <td><button class="btn btn-sm btn-ghost btn-danger" onclick="delOnePC('${pc.id}')">Delete</button></td>
     </tr>`;}).join('')}
    </tbody></table>`;
  }
 }

 window._dbt=t=>{dbTab=t;dbSearch='';const si=document.getElementById('db-search');if(si)si.value='';drawTable();document.getElementById('topbar-actions').innerHTML=`<button class="btn btn-sm" onclick="exportCSV('${t}')">Export CSV</button>`;};
 window._dbSalSort=function(){dbSalesSort=dbSalesSort==='desc'?'asc':'desc';drawTable();};
 window._dbExpSort=function(){dbExpSort=dbExpSort==='desc'?'asc':'desc';drawTable();};
 window._dbMovSort=function(){dbMovSort=dbMovSort==='desc'?'asc':'desc';drawTable();};
 window._dbPcSort=function(){dbPcSort=dbPcSort==='desc'?'asc':'desc';drawTable();};
 window._satx=v=>{DB.transactions.forEach(t=>t._sel=v);drawTable();};
 window._sap=v=>{DB.products.forEach(p=>p._sel=v);drawTable();};
 window._sae=v=>{DB.expenses.forEach(e=>e._sel=v);drawTable();};
 window._sam=v=>{DB.movements.forEach(m=>m._sel=v);drawTable();};
 window._sapc=v=>{DB.priceChanges.forEach(pc=>pc._sel=v);drawTable();};
 window._stx=(id,v)=>{const t=DB.transactions.find(x=>x.id===id);if(t)t._sel=v;};
 window._sp=(id,v)=>{const p=DB.products.find(x=>x.id===id);if(p)p._sel=v;};

 window._spc=(id,v)=>{const pc=DB.priceChanges.find(x=>x.id===id);if(pc)pc._sel=v;};
 window._dbRdw=drawTable;
 drawTable();
}

window.clearAll=async function(type){
 const labels={sales:'ALL sales records',products:'ALL products',expenses:'ALL expenses',movements:'ALL inventory movements',pricechanges:'ALL price change records'};

// 
// INVENTORY MOVEMENT LOGGER
// 
function logMovement(product, action, qtyBefore, qtyChange, note=''){
 const mv={
  id:'MV'+uid(),
  date:today(),
  time:nowTime(),
  productId:product.id,
  productName:product.name,
  sku:product.sku||'',
  action,
  qtyBefore,
  qtyChange,
  qtyAfter:qtyBefore+qtyChange,
  note,
  createdAt:new Date().toISOString()
 };
 DB.movements.unshift(mv);
 saveMovement(mv);
}

// 
// PRICE CHANGE LOGGER
// Handles sell price and/or cost price changes in a single record.
// 
function logPriceChange(product, oldPrice, newPrice, oldCost, newCost, userNote=''){
 // Round to 2dp before comparing to avoid floating-point false positives
 const sellDiff=Math.round((newPrice-oldPrice)*100)/100;
 const costDiff=Math.round((newCost-oldCost)*100)/100;
 const sellChanged=sellDiff!==0;
 const costChanged=costDiff!==0;
 // Only log if sell price or cost price actually changed — nothing else
 if(!sellChanged&&!costChanged) return;

 // Determine action label
 let action;
 if(sellChanged&&costChanged){
  action='Sell & Cost Price Change';
 } else if(sellChanged){
  action=sellDiff>0?'Sell Price Increase':'Sell Price Decrease';
 } else {
  action=costDiff>0?'Cost Price Increase':'Cost Price Decrease';
 }

 // Note describes only price changes — no other product attributes
 const parts=[];
 if(sellChanged) parts.push('Sell price: '+fmt(oldPrice)+' → '+fmt(newPrice)+' ('+(sellDiff>0?'+':'')+fmt(sellDiff)+')');
 if(costChanged) parts.push('Cost price: '+fmt(oldCost)+' → '+fmt(newCost)+' ('+(costDiff>0?'+':'')+fmt(costDiff)+')');
 const autoNote=parts.join(' | ');
 const note=userNote?autoNote+' — '+userNote:autoNote;

 const pc={
  id:'PC'+uid(),
  date:today(),
  time:nowTime(),
  productId:product.id,
  productName:product.name,
  sku:product.sku||'',
  action,
  oldPrice,
  newPrice,
  change:sellDiff,
  oldCost:costChanged?oldCost:'',
  newCost:costChanged?newCost:'',
  costChange:costChanged?costDiff:'',
  note,
  createdAt:new Date().toISOString()
 };
 DB.priceChanges.unshift(pc);
 savePriceChange(pc);
}

// 
// EXPORT TO CSV
// 
window.exportCSV=function(type){
 let rows=[], filename='', headers=[];

 if(type==='sales'){
  filename='Lootly_Sales_'+today()+'.csv';
  headers=['ID','Date','Time','Items','Subtotal','GST','Total','Payment','Cash Tendered','Change'];
  rows=DB.transactions.map(t=>[
   t.id,
   t.date,
   t.time||'',
   (t.items||[]).map(i=>i.name+'x'+i.qty).join(' | '),
   t.subtotal.toFixed(2),
   t.tax.toFixed(2),
   t.total.toFixed(2),
   t.payment,
   t.payment==='Cash'?(t.cashTendered||0).toFixed(2):'',
   t.payment==='Cash'?(t.change||0).toFixed(2):''
  ]);
 } else if(type==='products'){
  filename='Lootly_Products_'+today()+'.csv';
  headers=['ID','SKU','Name','Brand','Make','Model','Category','Sell Price','Cost Price (₱)','SGD Cost','Margin %','Stock','Date Added'];
  rows=DB.products.map(p=>[
   p.id,
   p.sku||'',
   p.name,
   p.brand||'',
   p.make||'',
   p.model||'',
   p.category,
   p.price.toFixed(2),
   p.cost.toFixed(2),
   p.costSGD?Number(p.costSGD).toFixed(2):'',
   p.price>0?((p.price-p.cost)/p.price*100).toFixed(1):'0',
   p.stock,
   toDateStr(p.dateAdded)||toDateStr(p.createdAt)||''
  ]);
 } else if(type==='expenses'){
  filename='Lootly_Expenses_'+today()+'.csv';
  headers=['ID','Date','Category','Description','Amount'];
  rows=DB.expenses.map(e=>[
   e.id,
   e.date,
   e.category,
   e.desc,
   e.amount.toFixed(2)
  ]);
 } else if(type==='movements'){
  filename='Lootly_InventoryMovements_'+today()+'.csv';
  headers=['ID','Date','Time','SKU','Product','Action','Qty Before','Qty Change','Qty After','Note'];
  rows=DB.movements.map(m=>[
   m.id,
   m.date,
   m.time||'',
   m.sku||'',
   m.productName,
   m.action,
   m.qtyBefore,
   m.qtyChange,
   m.qtyAfter,
   m.note||''
  ]);
 } else if(type==='pricechanges'){
  filename='Lootly_PriceChanges_'+today()+'.csv';
  headers=['ID','Date','Time','SKU','Product','Action','Old Sell Price','New Sell Price','Sell Change','Old Cost Price','New Cost Price','Cost Change','Note'];
  rows=DB.priceChanges.map(pc=>[
   pc.id,
   pc.date,
   pc.time||'',
   pc.sku||'',
   pc.productName,
   pc.action,
   pc.change!==0&&pc.change!==''?Number(pc.oldPrice).toFixed(2):'',
   pc.change!==0&&pc.change!==''?Number(pc.newPrice).toFixed(2):'',
   pc.change!==0&&pc.change!==''?Number(pc.change).toFixed(2):'',
   pc.costChange!==0&&pc.costChange!==''?Number(pc.oldCost).toFixed(2):'',
   pc.costChange!==0&&pc.costChange!==''?Number(pc.newCost).toFixed(2):'',
   pc.costChange!==0&&pc.costChange!==''?Number(pc.costChange).toFixed(2):'',
   pc.note||''
  ]);
 }

 if(!rows.length){alert('No data to export.');return;}

 // Build CSV — wrap fields containing commas/quotes in double quotes
 function escField(v){
  const s=String(v===null||v===undefined?'':v);
  return s.includes(',')||s.includes('"')||s.includes('\n')
   ? '"'+s.replace(/"/g,'""')+'"'
   : s;
 }
 const csv=[headers, ...rows].map(r=>r.map(escField).join(',')).join('\r\n');
 const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
 const url=URL.createObjectURL(blob);
 const a=document.createElement('a');
 a.href=url;a.download=filename;a.click();
 URL.revokeObjectURL(url);
};
